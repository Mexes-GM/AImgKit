name: Build EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Opt into Node 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt && pip install pyinstaller==6.20.0 pytest==8.3.4

      - name: Run tests
        run: pytest -q

      - name: Download ffmpeg (LGPL static build)
        run: |
          # LGPL build: AImgKit only remuxes (-c copy), so no GPL codecs are needed.
          # See THIRD_PARTY_NOTICES.md for the license + source reference.
          $url = 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip'
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract
          Copy-Item (Get-ChildItem -Recurse -Filter ffmpeg.exe ffmpeg_extract).FullName .

      - name: Build with PyInstaller
        run: |
          pyinstaller AImgKit.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AImgKit
          path: dist/AImgKit.exe
          retention-days: 7

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AImgKit.exe
            THIRD_PARTY_NOTICES.md
          generate_release_notes: true
